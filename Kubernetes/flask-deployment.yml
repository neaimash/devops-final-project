apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app  
  template:
    metadata:
      labels:
        app: flask-app  
    spec:
      containers: 
        - name: flask-container
          image: neaimash/flask-app:v1
          envFrom:
            - configMapRef:
                name: flask-config
          ports:
            - containerPort: 5000
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5            